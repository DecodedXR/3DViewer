name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Bulletproof gate: the app must compile and bundle. Always reliable on CI.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # Runtime gate: headless WebGL smoke. Software-rendered (SwiftShader), so it
  # can be flaky across Chromium versions; kept as a separate job so a build
  # failure and a render failure are distinguishable.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke
